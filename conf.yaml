server:
  port: 1983
  host: "0.0.0.0"
  read_timeout: 30s
  write_timeout: 30s
  shutdown_timeout: 15s

data:
  dir: "./data"

indexer:
  batch_size: 100
  max_file_size_mb: 10

parser:
  max_depth: 100
  ignore_patterns:
    - "node_modules"
    - ".git"
    - "vendor"
    - "__pycache__"
    - ".idea"
    - ".vscode"

frontend:
  static_dir: "./web/static"

logging:
  level: "debug"
  format: "text"
  dir: "./logs"
  rotation:
    max_size_mb: 64
    max_age_days: 30
    max_backups: 5
    compress: true

cors:
  allowed_origins:
    - "http://localhost:5173"
    - "http://localhost:1983"
  allowed_methods:
    - "GET"
    - "POST"
    - "OPTIONS"
  allowed_headers:
    - "Content-Type"
